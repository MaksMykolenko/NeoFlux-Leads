<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NeoFlux • Display number</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; display: flex; align-items: center; gap: 36px; }
  .num { font-size: 96px; font-weight: 600; letter-spacing: -0.03em; color: var(--score-good); font-variant-numeric: tabular-nums; line-height: 1; }
  .small { color: var(--fg-4); font-size: 18px; }
  .meta .eyebrow { display:block; margin-bottom: 6px;}
  .meta .lbl { color: var(--score-good); font-weight: 500; font-size: 14px; margin-top: 6px;}
  .meta .name { font-size: 16px; font-weight: 600; color: var(--fg-1); }
  .bar { height: 6px; width: 220px; background: var(--color-gray-100); border-radius: 999px; margin-top: 12px; overflow: hidden; }
  .bar > i { display:block; height: 100%; width: 82%; background: var(--score-bar-good); border-radius: 999px; }
</style>
</head>
<body>
  <div style="display:flex; align-items:baseline; gap: 8px">
    <span class="num">82</span>
    <span class="small">/ 100</span>
  </div>
  <div class="meta">
    <span class="eyebrow">OPPORTUNITY SCORE</span>
    <div class="name">Пріоритет ліда для продажу</div>
    <div class="lbl">Високий потенціал для продажу послуг</div>
    <div class="bar"><i></i></div>
  </div>
</body>
</html>
