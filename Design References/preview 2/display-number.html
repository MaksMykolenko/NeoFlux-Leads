<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 22px; background: var(--bg-page); color: var(--fg-1); }
</style>
</head>
<body>

<div style="display:flex; align-items:center; gap:36px">
  <div style="display:flex; align-items:baseline; gap:8px">
    <span style="font-size:96px; font-weight:600; letter-spacing:-.03em; color:var(--score-good); font-variant-numeric:tabular-nums; line-height:1">82</span>
    <span style="color:var(--fg-4); font-size:18px">/ 100</span>
  </div>
  <div>
    <div class="eyebrow" style="margin-bottom:6px">OPPORTUNITY SCORE</div>
    <div style="font-size:16px; font-weight:600; color:var(--fg-1)">Пріоритет ліда для продажу</div>
    <div style="color:var(--score-good); font-weight:500; font-size:14px; margin-top:6px">Високий потенціал для продажу послуг</div>
    <div style="height:6px; width:220px; background:rgba(255,255,255,.08); border-radius:999px; margin-top:12px; overflow:hidden">
      <div style="height:100%; width:82%; background:var(--score-bar-good); border-radius:999px"></div>
    </div>
  </div>
</div>

</body>
</html>
