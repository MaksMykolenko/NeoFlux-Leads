<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NeoFlux • Status palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: #fff; font-family: var(--font-sans);}
  .grid { display:flex; flex-wrap: wrap; gap: 10px; }
  .pill { display:inline-flex; align-items:center; padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 500; box-shadow: inset 0 0 0 1px var(--ring);}
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-top: 14px;}
  .swatch { display:flex; flex-direction:column; gap: 4px; align-items:center; font-family: var(--font-mono); font-size: 10px; color: var(--fg-3);}
  .chip { width: 100%; height: 36px; border-radius: 8px; }
</style>
</head>
<body>
  <div class="grid">
    <span class="pill" style="--ring:#bfdbfe; background:#eff6ff; color:#1d4ed8">New</span>
    <span class="pill" style="--ring:#c7d2fe; background:#eef2ff; color:#4338ca">Qualified</span>
    <span class="pill" style="--ring:#fde68a; background:#fffbeb; color:#b45309">Contacted</span>
    <span class="pill" style="--ring:#e9d5ff; background:#faf5ff; color:#7e22ce">Replied</span>
    <span class="pill" style="--ring:#bbf7d0; background:#f0fdf4; color:#15803d">Won</span>
    <span class="pill" style="--ring:#fecaca; background:#fef2f2; color:#b91c1c">Lost</span>
  </div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#2563eb"></div>blue-600</div>
    <div class="swatch"><div class="chip" style="background:#4338ca"></div>indigo-700</div>
    <div class="swatch"><div class="chip" style="background:#b45309"></div>amber-700</div>
    <div class="swatch"><div class="chip" style="background:#7e22ce"></div>purple-700</div>
    <div class="swatch"><div class="chip" style="background:#15803d"></div>green-700</div>
    <div class="swatch"><div class="chip" style="background:#b91c1c"></div>red-700</div>
  </div>
</body>
</html>
