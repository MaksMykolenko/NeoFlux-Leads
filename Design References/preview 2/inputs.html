<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 22px; background: var(--bg-page); color: var(--fg-1); }
</style>
</head>
<body>

<div style="display:flex; gap:18px; flex-wrap:wrap">
  <div>
    <label style="display:block; font-size:11px; font-weight:600; color:var(--fg-3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px">Default</label>
    <input style="background:#0b0c10; border:1px solid #3f3f46; color:#fff; border-radius:8px; padding:10px 14px; font-size:14px; min-width:220px; outline:none; font-family: var(--font-sans)" placeholder="Ніша (напр. Стоматологія)">
  </div>
  <div>
    <label style="display:block; font-size:11px; font-weight:600; color:var(--fg-3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px">Focused</label>
    <input style="background:#0b0c10; border:1px solid #6a00ff; color:#fff; border-radius:8px; padding:10px 14px; font-size:14px; min-width:220px; outline:none; box-shadow: 0 0 0 2px rgba(106,0,255,0.20); font-family: var(--font-sans)" value="Черкаси">
  </div>
</div>

</body>
</html>
