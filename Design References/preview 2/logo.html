<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 22px; background: var(--bg-page); color: var(--fg-1); }
</style>
</head>
<body>

<div style="display:flex; align-items:center; gap:36px; min-height:96px">
  <img src="../assets/logo-mark.svg" alt="Flux Leads mark" style="height:72px; width:72px; border-radius:14px; box-shadow:0 0 24px rgba(106,0,255,0.5)">
  <img src="../assets/logo-wordmark-dark.svg" alt="Flux Leads wordmark" style="height:48px">
  <div style="font-size:11px; font-family: var(--font-mono); color:var(--fg-3); max-width: 220px; line-height: 1.5">
    Solid <code style="color:var(--flux-purple-soft)">#6a00ff</code> mark always wears<br>
    a soft <code style="color:var(--flux-purple-soft)">rgba(106,0,255,0.5)</code> glow in dark mode.
  </div>
</div>

</body>
</html>
