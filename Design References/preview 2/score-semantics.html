<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 22px; background: var(--bg-page); color: var(--fg-1); }
</style>
</head>
<body>

<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:16px">
  <div style="border:1px solid var(--border-1); border-radius:12px; padding:16px; background:var(--bg-card)">
    <span style="display:inline-block; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:500; background:rgba(16,185,129,.10); color:#6ee7b7; box-shadow: inset 0 0 0 1px rgba(16,185,129,.30); margin-bottom:8px">Високий</span>
    <div style="font-size:56px; font-weight:600; line-height:1; letter-spacing:-.025em; color:#34d399; font-variant-numeric:tabular-nums">82</div>
    <div style="font-size:12px; font-weight:500; color:#34d399; margin-top:6px">Високий потенціал для продажу послуг</div>
    <div style="height:6px; border-radius:999px; background:rgba(255,255,255,.08); margin-top:12px; overflow:hidden"><div style="height:100%; width:82%; background:#10b981; border-radius:999px"></div></div>
  </div>
  <div style="border:1px solid var(--border-1); border-radius:12px; padding:16px; background:var(--bg-card)">
    <span style="display:inline-block; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:500; background:rgba(245,158,11,.10); color:#fcd34d; box-shadow: inset 0 0 0 1px rgba(245,158,11,.30); margin-bottom:8px">Середній</span>
    <div style="font-size:56px; font-weight:600; line-height:1; letter-spacing:-.025em; color:#fbbf24; font-variant-numeric:tabular-nums">54</div>
    <div style="font-size:12px; font-weight:500; color:#fbbf24; margin-top:6px">Помірний потенціал — варто перевірити</div>
    <div style="height:6px; border-radius:999px; background:rgba(255,255,255,.08); margin-top:12px; overflow:hidden"><div style="height:100%; width:54%; background:#f59e0b; border-radius:999px"></div></div>
  </div>
  <div style="border:1px solid var(--border-1); border-radius:12px; padding:16px; background:var(--bg-card)">
    <span style="display:inline-block; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:500; background:rgba(239,68,68,.10); color:#fca5a5; box-shadow: inset 0 0 0 1px rgba(239,68,68,.30); margin-bottom:8px">Низький</span>
    <div style="font-size:56px; font-weight:600; line-height:1; letter-spacing:-.025em; color:#f87171; font-variant-numeric:tabular-nums">28</div>
    <div style="font-size:12px; font-weight:500; color:#f87171; margin-top:6px">Низький пріоритет</div>
    <div style="height:6px; border-radius:999px; background:rgba(255,255,255,.08); margin-top:12px; overflow:hidden"><div style="height:100%; width:28%; background:#ef4444; border-radius:999px"></div></div>
  </div>
</div>

</body>
</html>
