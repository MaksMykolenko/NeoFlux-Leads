<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NeoFlux • Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: white; font-family: var(--font-sans);}
  .row { display:flex; gap: 12px; flex-wrap: wrap;}
  input, select, textarea { font: inherit; box-sizing: border-box;}
  .field { background: #f9fafb; border: 1px solid #d1d5db; color: #111827; border-radius: 8px; padding: 10px 14px; font-size: 14px; min-width: 220px; outline: none;}
  .field:focus, .focused { background: white; border-color: #3b82f6; box-shadow: 0 0 0 2px #dbeafe;}
  .label { display:block; font-size: 11px; font-weight: 600; color: var(--fg-3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px;}
</style>
</head>
<body>
  <div class="row">
    <div>
      <label class="label">Default</label>
      <input class="field" placeholder="Ніша (напр. Стоматологія)">
    </div>
    <div>
      <label class="label">Focused</label>
      <input class="field focused" value="Черкаси">
    </div>
  </div>
</body>
</html>
