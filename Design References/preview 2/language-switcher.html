<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 18px; background: var(--bg-page); color: var(--fg-1); font-family: var(--font-sans); }
</style>
</head>
<body>
<div style="display:flex; gap:24px; align-items:center; flex-wrap:wrap">
  <div style="display:inline-flex; height:32px; align-items:center; gap:2px; border-radius:6px; border:1px solid var(--flux-border); background:#13141c; padding:2px">
    <span style="display:inline-flex; height:28px; min-width:28px; align-items:center; justify-content:center; border-radius:4px; padding: 0 8px; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.05em; background:#27272a; color:#fff; box-shadow: 0 1px 2px rgba(0,0,0,.3)">UK</span>
    <span style="display:inline-flex; height:28px; min-width:28px; align-items:center; justify-content:center; border-radius:4px; padding: 0 8px; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.05em; color:#a1a1aa; cursor:pointer">EN</span>
  </div>
  <div style="display:inline-flex; height:32px; align-items:center; gap:2px; border-radius:6px; border:1px solid #e4e4e7; background:#fafafa; padding:2px">
    <span style="display:inline-flex; height:28px; min-width:28px; align-items:center; justify-content:center; border-radius:4px; padding: 0 8px; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.05em; color:#71717a; cursor:pointer">UK</span>
    <span style="display:inline-flex; height:28px; min-width:28px; align-items:center; justify-content:center; border-radius:4px; padding: 0 8px; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.05em; background:#fff; color:#18181b; box-shadow: 0 1px 2px rgba(0,0,0,.05)">EN</span>
  </div>
  <p style="margin:0; font-size:12px; color:var(--fg-3); font-family: var(--font-mono)">Dark · Light · two pill segmented</p>
</div>
</body>
</html>
