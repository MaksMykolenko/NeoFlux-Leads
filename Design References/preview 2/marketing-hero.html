<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 18px; background: var(--bg-page); color: var(--fg-1); font-family: var(--font-sans); }
</style>
</head>
<body>
<div style="position:relative; overflow:hidden; border-radius:24px; padding: 40px 48px; background: #0a0a0f; background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 48px 48px;">
  <div style="display:flex; gap:48px; align-items:center">
    <div style="flex: 1">
      <div style="display:inline-flex; align-items:center; gap:8px; border-radius:999px; border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.05); padding: 4px 14px; font-size: 11px; font-weight: 600; color:#b580ff">
        <span style="display:inline-block; height:6px; width:6px; border-radius:999px; background:#6a00ff"></span>
        AI lead generation
      </div>
      <h1 style="margin: 24px 0 0; font-size: 36px; font-weight: 800; letter-spacing:-.025em; line-height:1.05; background: linear-gradient(to bottom, #fff, #a1a1aa); -webkit-background-clip: text; background-clip: text; color: transparent">Знайдіть клієнтів швидше за конкурентів</h1>
      <p style="margin: 14px 0 0; max-width: 380px; font-size: 14px; line-height: 1.55; color: #a1a1aa">Gemini шукає компанії в Google, аудитує сайти, пише персональні листи — все одним кліком.</p>
      <div style="margin-top: 24px; display:flex; gap:10px; flex-wrap: wrap">
        <button style="display:inline-flex; height:42px; align-items:center; border-radius:12px; background:#6a00ff; padding: 0 24px; font-size:13px; font-weight:600; color:#fff; border:none; cursor:pointer; font-family: var(--font-sans)">Спробувати</button>
        <button style="display:inline-flex; height:42px; align-items:center; border-radius:12px; border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.02); padding: 0 24px; font-size:13px; font-weight:600; color:#fff; cursor:pointer; font-family: var(--font-sans)">Дивитися демо</button>
      </div>
    </div>
    <div style="position: relative; width: 160px; flex-shrink: 0">
      <div style="border-radius: 24px; border: 1px solid rgba(255,255,255,.10); background: linear-gradient(180deg, #13141c, #0a0a0f); padding: 12px">
        <div style="display:flex; aspect-ratio: 1; align-items:center; justify-content:center; overflow:hidden; border-radius: 16px; border:1px solid rgba(255,255,255,.05); background: #0b0c10">
          <img src="../assets/logo-mark.svg" style="height:80px; width:80px">
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
