<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 22px; background: var(--bg-page); color: var(--fg-1); }
</style>
</head>
<body>

<div style="display:flex; gap:14px; align-items:flex-end; flex-wrap: wrap">
  
    <div style="background:var(--bg-card); border:1px solid var(--border-1); padding:14px 16px; min-width:130px; border-radius:6px">
      <div style="font-size:13px; font-weight:600; color:var(--fg-1)">md · 6px</div>
      <div style="font-family: var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:.04em; margin-top:8px">small inline btn</div>
    </div>
    <div style="background:var(--bg-card); border:1px solid var(--border-1); padding:14px 16px; min-width:130px; border-radius:8px">
      <div style="font-size:13px; font-weight:600; color:var(--fg-1)">lg · 8px</div>
      <div style="font-family: var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:.04em; margin-top:8px">inputs</div>
    </div>
    <div style="background:var(--bg-card); border:1px solid var(--border-1); padding:14px 16px; min-width:130px; border-radius:12px">
      <div style="font-size:13px; font-weight:600; color:var(--fg-1)">xl · 12px</div>
      <div style="font-family: var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:.04em; margin-top:8px">inner cards</div>
    </div>
    <div style="background:var(--bg-card); border:1px solid var(--border-1); padding:14px 16px; min-width:130px; border-radius:16px">
      <div style="font-size:13px; font-weight:600; color:var(--fg-1)">2xl · 16px ★</div>
      <div style="font-family: var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:.04em; margin-top:8px">card (canonical)</div>
    </div>
    <div style="background:var(--bg-card); border:1px solid var(--border-1); padding:14px 16px; min-width:130px; border-radius:24px">
      <div style="font-size:13px; font-weight:600; color:var(--fg-1)">3xl · 24px</div>
      <div style="font-family: var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:.04em; margin-top:8px">marketing hero</div>
    </div>
    <div style="background:var(--bg-card); border:1px solid var(--border-1); padding:14px 16px; min-width:130px; border-radius:999px">
      <div style="font-size:13px; font-weight:600; color:var(--fg-1)">full</div>
      <div style="font-family: var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:.04em; margin-top:8px">pills</div>
    </div>
</div>

</body>
</html>
