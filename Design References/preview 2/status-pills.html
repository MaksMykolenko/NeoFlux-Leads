<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 22px; background: var(--bg-page); color: var(--fg-1); }
</style>
</head>
<body>

<p class="eyebrow" style="margin: 0 0 14px">Status pipeline — dark + light, identical sequence</p>
<div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom: 16px">
  <span style="display:inline-flex; align-items:center; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:500; background:rgba(59,130,246,.10); color:#93c5fd; box-shadow: inset 0 0 0 1px rgba(59,130,246,.30)">New</span>
  <span style="display:inline-flex; align-items:center; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:500; background:rgba(139,92,246,.10); color:#c4b5fd; box-shadow: inset 0 0 0 1px rgba(139,92,246,.30)">Qualified</span>
  <span style="display:inline-flex; align-items:center; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:500; background:rgba(245,158,11,.10); color:#fcd34d; box-shadow: inset 0 0 0 1px rgba(245,158,11,.30)">Contacted</span>
  <span style="display:inline-flex; align-items:center; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:500; background:rgba(244,63,94,.10); color:#fda4af; box-shadow: inset 0 0 0 1px rgba(244,63,94,.30)">Replied</span>
  <span style="display:inline-flex; align-items:center; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:500; background:rgba(16,185,129,.10); color:#6ee7b7; box-shadow: inset 0 0 0 1px rgba(16,185,129,.30)">Won</span>
  <span style="display:inline-flex; align-items:center; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:500; background:rgba(239,68,68,.10); color:#fca5a5; box-shadow: inset 0 0 0 1px rgba(239,68,68,.30)">Lost</span>
</div>
<div style="background:#fafafa; border-radius: 12px; padding:14px 16px; display:flex; flex-wrap:wrap; gap:10px">
  <span style="display:inline-flex; align-items:center; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:500; background:#eff6ff; color:#1d4ed8; box-shadow: inset 0 0 0 1px #bfdbfe">New</span>
  <span style="display:inline-flex; align-items:center; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:500; background:#f5f3ff; color:#6d28d9; box-shadow: inset 0 0 0 1px #ddd6fe">Qualified</span>
  <span style="display:inline-flex; align-items:center; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:500; background:#fffbeb; color:#b45309; box-shadow: inset 0 0 0 1px #fde68a">Contacted</span>
  <span style="display:inline-flex; align-items:center; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:500; background:#fff1f2; color:#be123c; box-shadow: inset 0 0 0 1px #fecdd3">Replied</span>
  <span style="display:inline-flex; align-items:center; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:500; background:#ecfdf5; color:#047857; box-shadow: inset 0 0 0 1px #a7f3d0">Won</span>
  <span style="display:inline-flex; align-items:center; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:500; background:#fef2f2; color:#b91c1c; box-shadow: inset 0 0 0 1px #fecaca">Lost</span>
</div>
<p style="margin: 14px 0 0; font-size: 11px; color: var(--fg-3)">Replied switched <strong>from purple to rose</strong> — purple is now the brand color and conflicts.</p>

</body>
</html>
