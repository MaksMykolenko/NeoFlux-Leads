<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NeoFlux • Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: white; font-family: var(--font-sans);}
  .row { display:flex; align-items:center; gap: 14px; margin-bottom: 8px;}
  .bar { background: linear-gradient(90deg, #2563eb, #2563eb88); height: 14px; border-radius: 4px;}
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: .04em; min-width: 90px;}
  .px { font-size: 12px; color: var(--fg-2); font-family: var(--font-mono);}
</style>
</head>
<body>
  <div class="row"><span class="name">space-1</span><span class="bar" style="width:4px"></span><span class="px">4px</span></div>
  <div class="row"><span class="name">space-2</span><span class="bar" style="width:8px"></span><span class="px">8px</span></div>
  <div class="row"><span class="name">space-3</span><span class="bar" style="width:12px"></span><span class="px">12px</span></div>
  <div class="row"><span class="name">space-4</span><span class="bar" style="width:16px"></span><span class="px">16px</span></div>
  <div class="row"><span class="name">space-6 ★</span><span class="bar" style="width:24px"></span><span class="px">24px · card padding</span></div>
  <div class="row"><span class="name">space-8</span><span class="bar" style="width:32px"></span><span class="px">32px</span></div>
  <div class="row"><span class="name">space-10</span><span class="bar" style="width:40px"></span><span class="px">40px</span></div>
  <div class="row"><span class="name">space-12</span><span class="bar" style="width:48px"></span><span class="px">48px</span></div>
</body>
</html>
