<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NeoFlux • Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: white; font-family: var(--font-sans);}
  .row { display:flex; gap: 24px; align-items: center;}
  .group { display:flex; flex-direction: column; align-items: center; gap: 6px; color: var(--fg-2);}
  .lbl { font-size: 10px; color: var(--fg-3); font-family: var(--font-mono); letter-spacing: .04em;}
  .empty { width: 48px; height: 48px; border-radius: 999px; background: #f3f4f6; display:flex; align-items: center; justify-content: center; color: #9ca3af;}
</style>
</head>
<body>
  <div class="row">
    <div class="group">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 7.22a.75.75 0 0 1 1.06 0L10 10.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 8.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
      <span class="lbl">mini · 20×20</span>
    </div>
    <div class="group">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.7 4.15a.75.75 0 0 1 .15 1.05l-8 10.5a.75.75 0 0 1-1.13.08l-4.5-4.5a.75.75 0 1 1 1.06-1.06l3.9 3.9 7.48-9.82a.75.75 0 0 1 1.05-.15Z" clip-rule="evenodd"/></svg>
      <span class="lbl">check</span>
    </div>
    <div class="group">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 4.5a.75.75 0 0 1 .72.54l.81 2.85a3.75 3.75 0 0 0 2.58 2.58l2.85.81a.75.75 0 0 1 0 1.44l-2.85.81a3.75 3.75 0 0 0-2.58 2.58l-.81 2.85a.75.75 0 0 1-1.44 0l-.81-2.85a3.75 3.75 0 0 0-2.58-2.58l-2.85-.81a.75.75 0 0 1 0-1.44l2.85-.81A3.75 3.75 0 0 0 7.47 7.89l.81-2.85A.75.75 0 0 1 9 4.5Z" clip-rule="evenodd"/></svg>
      <span class="lbl">sparkle</span>
    </div>
    <div class="group">
      <div class="empty">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.2-5.2m0 0a7.5 7.5 0 1 0-10.6-10.6 7.5 7.5 0 0 0 10.6 10.6Z"/></svg>

    <div class="group">
      <div class="empty">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25"/></svg>

      <span class="lbl">empty-state</span>
    </div>
  </div>
</body>
</html>
