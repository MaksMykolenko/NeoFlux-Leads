<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NeoFlux • Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: #fff; }
  .grid { display:grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border-radius: 10px; padding: 12px; border: 1px solid var(--border-1); aspect-ratio: 1.4 / 1; display:flex; flex-direction: column; justify-content: space-between; font-family: var(--font-mono); }
  .sw .name { font-size: 11px; color: var(--fg-3); letter-spacing: .04em; }
  .sw .hex { font-size: 11px; color: var(--fg-2); }
  .sw.dark .name, .sw.dark .hex { color: rgba(255,255,255,.78);}
</style>
</head>
<body>
  <div class="grid">
    <div class="sw" style="background:#ffffff"><span class="name">white</span><span class="hex">#FFFFFF</span></div>
    <div class="sw" style="background:#f9fafb"><span class="name">gray-50</span><span class="hex">#F9FAFB</span></div>
    <div class="sw" style="background:#f3f4f6"><span class="name">gray-100</span><span class="hex">#F3F4F6</span></div>
    <div class="sw" style="background:#e5e7eb"><span class="name">gray-200</span><span class="hex">#E5E7EB</span></div>
    <div class="sw" style="background:#d1d5db"><span class="name">gray-300</span><span class="hex">#D1D5DB</span></div>
    <div class="sw" style="background:#9ca3af"><span class="name">gray-400</span><span class="hex">#9CA3AF</span></div>
    <div class="sw dark" style="background:#6b7280"><span class="name">gray-500</span><span class="hex">#6B7280</span></div>
    <div class="sw dark" style="background:#4b5563"><span class="name">gray-600</span><span class="hex">#4B5563</span></div>
    <div class="sw dark" style="background:#374151"><span class="name">gray-700</span><span class="hex">#374151</span></div>
    <div class="sw dark" style="background:#1f2937"><span class="name">gray-800</span><span class="hex">#1F2937</span></div>
    <div class="sw dark" style="background:#111827"><span class="name">gray-900</span><span class="hex">#111827</span></div>
    <div class="sw dark" style="background:#000000"><span class="name">black</span><span class="hex">#000000</span></div>
  </div>
</body>
</html>
