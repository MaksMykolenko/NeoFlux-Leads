<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NeoFlux • AI accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--font-sans); display: flex; align-items: center; gap: 28px;}
  .btn { display:inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; color: white; background: linear-gradient(90deg, #7c3aed, #2563eb); box-shadow: 0 1px 2px rgba(0,0,0,.05); border: none; cursor: pointer;}
  .btn:hover { background: linear-gradient(90deg, #6d28d9, #1d4ed8);}
  .desc .eyebrow { display:block; margin-bottom: 4px;}
  .desc .name { font-size: 16px; font-weight: 600; color: var(--fg-1); margin-bottom: 2px;}
  .desc .sub { font-size: 13px; color: var(--fg-3);}
  .grad { height: 12px; width: 220px; border-radius: 999px; background: linear-gradient(90deg, #7c3aed, #2563eb); margin-top: 10px;}
</style>
</head>
<body>
  <button class="btn">
    <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 4.5a.75.75 0 0 1 .721.544l.813 2.846a3.75 3.75 0 0 0 2.576 2.576l2.846.813a.75.75 0 0 1 0 1.442l-2.846.813a3.75 3.75 0 0 0-2.576 2.576l-.813 2.846a.75.75 0 0 1-1.442 0l-.813-2.846a3.75 3.75 0 0 0-2.576-2.576l-2.846-.813a.75.75 0 0 1 0-1.442l2.846-.813A3.75 3.75 0 0 0 7.466 7.89l.813-2.846A.75.75 0 0 1 9 4.5Z" clip-rule="evenodd"/></svg>
    Згенерувати листа (AI)
  </button>
  <div class="desc">
    <span class="eyebrow">AI ACCENT</span>
    <div class="name">violet-600 → blue-600</div>
    <div class="sub">Reserved for AI-initiated actions only.</div>
    <div class="grad"></div>
  </div>
</body>
</html>
