<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 18px; background: var(--bg-page); color: var(--fg-1); font-family: var(--font-sans); }
</style>
</head>
<body>
<div style="display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap">
  <div>
    <p style="margin: 0 0 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--fg-3)">Closed</p>
    <button style="display:inline-flex; align-items:center; gap:4px; border-radius:999px; padding: 2px 8px; font-size: 10px; font-weight:500; text-transform:uppercase; letter-spacing:.05em; background:rgba(244,63,94,.15); color:#fda4af; border:none; cursor:pointer; font-family: var(--font-sans)">
      Replied
      <svg width="10" height="10" viewBox="0 0 20 20" fill="currentColor" style="opacity:.6"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 11.06l3.71-3.83a.75.75 0 1 1 1.08 1.04l-4.25 4.39a.75.75 0 0 1-1.08 0L5.21 8.27a.75.75 0 0 1 .02-1.06Z" clip-rule="evenodd"/></svg>
    </button>
  </div>
  <div>
    <p style="margin: 0 0 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--fg-3)">Open</p>
    <div style="position:relative; display:inline-block">
      <button style="display:inline-flex; align-items:center; gap:4px; border-radius:999px; padding: 2px 8px; font-size: 10px; font-weight:500; text-transform:uppercase; letter-spacing:.05em; background:#27272a; color:#a1a1aa; border:none; cursor:pointer; font-family: var(--font-sans)">
        No Reply
        <svg width="10" height="10" viewBox="0 0 20 20" fill="currentColor" style="opacity:.6; transform: rotate(180deg)"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 11.06l3.71-3.83a.75.75 0 1 1 1.08 1.04l-4.25 4.39a.75.75 0 0 1-1.08 0L5.21 8.27a.75.75 0 0 1 .02-1.06Z" clip-rule="evenodd"/></svg>
      </button>
      <div style="position:absolute; left:0; top:100%; margin-top:4px; min-width:160px; border-radius:6px; border:1px solid var(--flux-border); background:var(--flux-card); box-shadow: var(--shadow); overflow:hidden; z-index:10">
        <button style="display:flex; width:100%; align-items:center; justify-content:space-between; gap:8px; padding: 6px 12px; text-align:left; font-size:12px; background:transparent; border:none; color:#b580ff; font-weight: 600; cursor:pointer; font-family: var(--font-sans)">
          No Reply<svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor" style="color:#b580ff"><path fill-rule="evenodd" d="M16.7 4.5a.75.75 0 0 1 .1 1l-8 10.5a.75.75 0 0 1-1.1.05l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.89 3.89 7.48-9.82a.75.75 0 0 1 1.07-.06Z" clip-rule="evenodd"/></svg>
        </button><button style="display:flex; width:100%; align-items:center; justify-content:space-between; gap:8px; padding: 6px 12px; text-align:left; font-size:12px; background:transparent; border:none; color:#d4d4d8; font-weight: 400; cursor:pointer; font-family: var(--font-sans)">
          Replied
        </button><button style="display:flex; width:100%; align-items:center; justify-content:space-between; gap:8px; padding: 6px 12px; text-align:left; font-size:12px; background:transparent; border:none; color:#d4d4d8; font-weight: 400; cursor:pointer; font-family: var(--font-sans)">
          Interested
        </button><button style="display:flex; width:100%; align-items:center; justify-content:space-between; gap:8px; padding: 6px 12px; text-align:left; font-size:12px; background:transparent; border:none; color:#d4d4d8; font-weight: 400; cursor:pointer; font-family: var(--font-sans)">
          Bounced
        </button>
      </div>
    </div>
  </div>
  <div>
    <p style="margin: 0 0 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--fg-3)">Delivery</p>
    <div style="display:flex; flex-direction:column; gap:6px">
      <span style="display:inline-flex; align-items:center; gap:4px; border-radius:999px; padding: 2px 8px; font-size: 10px; font-weight:500; text-transform:uppercase; letter-spacing:.05em; background:rgba(16,185,129,.10); color:#6ee7b7; box-shadow: inset 0 0 0 1px rgba(16,185,129,.30)"><span style="display:inline-block; height:5px; width:5px; border-radius:999px; background:#10b981"></span>SENT</span>
      <span style="display:inline-flex; align-items:center; gap:4px; border-radius:999px; padding: 2px 8px; font-size: 10px; font-weight:500; text-transform:uppercase; letter-spacing:.05em; background:rgba(239,68,68,.10); color:#fca5a5; box-shadow: inset 0 0 0 1px rgba(239,68,68,.30)"><span style="display:inline-block; height:5px; width:5px; border-radius:999px; background:#ef4444"></span>FAILED <span style="display:inline-flex; height:14px; width:14px; align-items:center; justify-content:center; border-radius:999px; background:rgba(239,68,68,.20); margin-left: 2px; cursor:pointer">i</span></span>
      <span style="display:inline-flex; align-items:center; gap:4px; border-radius:999px; padding: 2px 8px; font-size: 10px; font-weight:500; text-transform:uppercase; letter-spacing:.05em; background:#27272a; color:#a1a1aa; box-shadow: inset 0 0 0 1px #3f3f46"><span style="display:inline-block; height:5px; width:5px; border-radius:999px; background:#71717a"></span>DRAFT</span>
    </div>
  </div>
</div>
</body>
</html>
