<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NeoFlux • Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; }
  .row { display: grid; grid-template-columns: 96px 1fr; gap: 18px 24px; align-items: baseline; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: var(--tracking-wider); text-transform: uppercase; padding-top: 6px; }
  .specimen { color: var(--fg-1); }
</style>
</head>
<body>
  <div class="row">
    <div class="label">3xl / 600</div>
    <div class="specimen" style="font-size:30px;font-weight:600;letter-spacing:-.025em;line-height:1.1">Холодний лист під цього ліда</div>
    <div class="label">2xl / 600</div>
    <div class="specimen" style="font-size:24px;font-weight:600;letter-spacing:-.025em;line-height:1.15">Останні ліди</div>
    <div class="label">base / 600</div>
    <div class="specimen" style="font-size:16px;font-weight:600">Контакти</div>
    <div class="label">sm / 400</div>
    <div class="specimen" style="font-size:14px;color:var(--fg-2);line-height:1.55">Бал розрахований із наявних даних. Запустіть аудит сайту.</div>
    <div class="label">xs upper</div>
    <div class="specimen eyebrow">OPPORTUNITY SCORE</div>
  </div>
</body>
</html>
