<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NeoFlux • Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: var(--bg-page); font-family: var(--font-sans);}
  .card { background: white; border: 1px solid var(--border-1); border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,.05); padding: 24px;}
  .eyebrow { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--fg-3);}
  h2 { font-size: 16px; font-weight: 600; color: var(--fg-1); margin: 4px 0 0;}
  p { font-size: 13px; color: var(--fg-3); margin: 4px 0 0;}
</style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">OPPORTUNITY SCORE</span>
    <h2>Пріоритет ліда для продажу</h2>
    <p>bg-white · border-gray-200 · rounded-xl · shadow-sm · p-6</p>
  </div>
</body>
</html>
