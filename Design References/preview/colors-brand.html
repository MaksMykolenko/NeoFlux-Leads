<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NeoFlux • Brand blue</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: #fff; font-family: var(--font-sans);}
  .h { font-size: 12px; color: var(--fg-3); letter-spacing: .04em; text-transform: uppercase; font-weight: 600; margin: 0 0 10px;}
  .grid { display:grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border-radius: 10px; padding: 12px; aspect-ratio: 1.4/1; display:flex; flex-direction: column; justify-content: space-between; font-family: var(--font-mono); border: 1px solid rgba(0,0,0,.04);}
  .sw .name { font-size: 11px; letter-spacing: .04em; }
  .sw .hex { font-size: 11px; opacity: .85; }
  .light { color: var(--fg-3);}
  .dark { color: #fff;}
</style>
</head>
<body>
  <p class="h">Primary action · blue-600 → blue-700</p>
  <div class="grid">
    <div class="sw light" style="background:#eff6ff"><span class="name">blue-50</span><span class="hex">#EFF6FF</span></div>
    <div class="sw light" style="background:#dbeafe"><span class="name">blue-100</span><span class="hex">#DBEAFE</span></div>
    <div class="sw light" style="background:#bfdbfe"><span class="name">blue-200</span><span class="hex">#BFDBFE</span></div>
    <div class="sw light" style="background:#93c5fd"><span class="name">blue-300</span><span class="hex">#93C5FD</span></div>
    <div class="sw dark" style="background:#3b82f6"><span class="name">blue-500</span><span class="hex">#3B82F6</span></div>
    <div class="sw dark" style="background:#2563eb; outline: 2px solid #2563eb22; outline-offset: 2px"><span class="name">blue-600 ★</span><span class="hex">#2563EB</span></div>
  </div>
</body>
</html>
