<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NeoFlux • Audit checks</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: white; font-family: var(--font-sans);}
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 480px;}
  .badge { display:flex; align-items:center; gap: 8px; padding: 10px 14px; border-radius: 8px; font-size: 14px; font-weight: 500;}
  .ok { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0;}
  .bad { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca;}
</style>
</head>
<body>
  <div class="grid">
    <div class="badge ok">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.7 4.15a.75.75 0 0 1 .15 1.05l-8 10.5a.75.75 0 0 1-1.13.08l-4.5-4.5a.75.75 0 1 1 1.06-1.06l3.9 3.9 7.48-9.82a.75.75 0 0 1 1.05-.15Z" clip-rule="evenodd"/></svg>
      SSL
    </div>
    <div class="badge bad">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L10 8.94l3.47-3.47a.75.75 0 1 1 1.06 1.06L11.06 10l3.47 3.47a.75.75 0 1 1-1.06 1.06L10 11.06l-3.47 3.47a.75.75 0 1 1-1.06-1.06L8.94 10 5.47 6.53a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
      Mobile-friendly
    </div>
  </div>
</body>
</html>
