<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 18px; background: var(--bg-page); color: var(--fg-1); font-family: var(--font-sans); }
</style>
</head>
<body>
<div style="display:flex; flex-direction:column; gap:12px; max-width: 580px">
  <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; border-radius:12px; border:1px solid rgba(16,185,129,.30); background:rgba(16,185,129,.10); padding: 12px 16px">
    <div style="display:flex; flex-wrap:wrap; align-items:center; gap:8px; font-size:14px">
      <span style="display:inline-flex; height:8px; width:8px; border-radius:999px; background:#10b981"></span>
      <span style="font-weight:600; color:#a7f3d0">Agency</span>
      <span style="color:#6ee7b7">— безлімітно</span>
    </div>
  </div>

  <div style="border-radius:12px; border:1px solid var(--flux-border); background:var(--flux-card); padding: 12px 16px">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; font-size:14px">
      <div>
        <span style="font-weight:600; color:#fff">Pro</span>
        <span style="color:#8a8d93"> — лишилось <span style="font-variant-numeric: tabular-nums">142 / 500</span> лідів</span>
      </div>
      <a style="font-size:12px; font-weight:600; color:#b580ff; text-decoration:none; cursor:pointer">Upgrade →</a>
    </div>
    <div style="margin-top:10px; height:6px; width:100%; overflow:hidden; border-radius:999px; background:rgba(255,255,255,.10)">
      <div style="height:100%; width:71%; border-radius:999px; background:#6a00ff"></div>
    </div>
  </div>

  <div style="border-radius:12px; border:1px solid rgba(239,68,68,.30); background:rgba(239,68,68,.10); padding: 12px 16px">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; font-size:14px">
      <div>
        <span style="font-weight:600; color:#fff">Starter</span>
        <span style="color:#fca5a5"> — лишилось <span style="font-variant-numeric: tabular-nums">3 / 50</span> лідів</span>
      </div>
      <a style="font-size:12px; font-weight:600; color:#fca5a5; text-decoration:none; cursor:pointer">Upgrade →</a>
    </div>
    <div style="margin-top:10px; height:6px; width:100%; overflow:hidden; border-radius:999px; background:rgba(255,255,255,.10)">
      <div style="height:100%; width:94%; border-radius:999px; background:#ef4444"></div>
    </div>
  </div>
</div>
</body>
</html>
