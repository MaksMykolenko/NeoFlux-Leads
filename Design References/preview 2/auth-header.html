<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 18px; background: var(--bg-page); color: var(--fg-1); font-family: var(--font-sans); }
</style>
</head>
<body>
<div style="border-bottom: 1px solid var(--flux-border); background: rgba(11,12,16,.8); backdrop-filter: blur(8px); padding: 0 24px">
  <div style="display:flex; height:64px; align-items:center; justify-content:space-between; gap:12px; max-width: 1024px; margin:0 auto">
    <!-- Brand -->
    <a style="display:inline-flex; align-items:center; gap:12px; padding: 4px; border-radius:8px; color:#fff; text-decoration:none">
      <span style="display:inline-flex; height:36px; width:36px; box-shadow:0 0 15px rgba(106,0,255,0.5); border-radius:14px">
        <img src="../assets/logo-mark.svg" alt="" style="height:100%; width:100%">
      </span>
      <span style="font-weight:700; letter-spacing:-.025em; font-size:16px">Flux Leads</span>
    </a>
    <!-- Actions -->
    <div style="display:flex; align-items:center; gap:8px">
      <!-- Theme toggle -->
      <button style="height:32px; width:32px; border-radius:6px; display:inline-flex; align-items:center; justify-content:center; background:transparent; color:#a1a1aa; border:none; cursor:pointer">
        <svg viewBox="0 0 20 20" fill="currentColor" style="height:16px; width:16px"><path d="M10 2.75a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5a.75.75 0 0 1 .75-.75ZM10 14.75a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5a.75.75 0 0 1 .75-.75ZM3.5 10a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5h-1.5A.75.75 0 0 1 3.5 10ZM14.25 10a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5H15a.75.75 0 0 1-.75-.75ZM10 6.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z"/></svg>
      </button>
      <!-- Lang switcher -->
      <div style="display:inline-flex; height:32px; align-items:center; gap:2px; border-radius:6px; border:1px solid var(--flux-border); background:#13141c; padding:2px">
        <span style="display:inline-flex; height:28px; min-width:28px; align-items:center; justify-content:center; border-radius:4px; padding: 0 8px; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.05em; background:#27272a; color:#fff">UK</span>
        <span style="display:inline-flex; height:28px; min-width:28px; align-items:center; justify-content:center; border-radius:4px; padding: 0 8px; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.05em; color:#a1a1aa">EN</span>
      </div>
      <!-- Admin pill -->
      <span style="display:inline-flex; height:32px; align-items:center; gap:6px; border-radius:6px; background:rgba(245,158,11,.10); padding: 0 10px; font-size:12px; font-weight:500; color:#fcd34d; box-shadow: inset 0 0 0 1px rgba(245,158,11,.30)">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 1a4.5 4.5 0 0 0-4.5 4.5V9H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-.5V5.5A4.5 4.5 0 0 0 10 1Zm3 8V5.5a3 3 0 1 0-6 0V9h6Z" clip-rule="evenodd"/></svg>
        Admin
      </span>
      <!-- Plan pill -->
      <span style="display:inline-flex; height:32px; align-items:center; gap:6px; border-radius:999px; border:1px solid var(--flux-border); background:#13141c; padding: 0 12px; font-size:12px; font-weight:500; color:#fff">
        <span style="display:inline-block; height:6px; width:6px; border-radius:999px; background:#6a00ff"></span>
        Pro
      </span>
      <span style="height:20px; width:1px; background:rgba(255,255,255,.1); margin: 0 4px"></span>
      <!-- Avatar -->
      <div style="display:flex; align-items:center; gap:8px">
        <div style="height:28px; width:28px; border-radius:999px; background:rgba(106,0,255,.15); color:#b580ff; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; text-transform:uppercase; box-shadow: inset 0 0 0 1px rgba(106,0,255,.30)">MM</div>
        <div style="line-height:1.1">
          <div style="font-size:13px; font-weight:500; color:#fff">Макс Миколенко</div>
          <div style="font-size:10px; color:#8a8d93">maks@neoflux.dev</div>
        </div>
      </div>
      <!-- Gear -->
      <button style="height:32px; width:32px; border-radius:6px; display:inline-flex; align-items:center; justify-content:center; background:transparent; color:#a1a1aa; border:none; cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.84 1.804A1 1 0 0 1 8.82 1h2.36a1 1 0 0 1 .98.804l.331 1.652a6.993 6.993 0 0 1 1.929 1.115l1.598-.54a1 1 0 0 1 1.186.447l1.18 2.044a1 1 0 0 1-.205 1.251l-1.267 1.113a7.047 7.047 0 0 1 0 2.228l1.267 1.113a1 1 0 0 1 .206 1.25l-1.18 2.045a1 1 0 0 1-1.187.447l-1.598-.54a6.993 6.993 0 0 1-1.929 1.115l-.33 1.652a1 1 0 0 1-.98.804H8.82a1 1 0 0 1-.98-.804l-.331-1.652a6.993 6.993 0 0 1-1.929-1.115l-1.598.54a1 1 0 0 1-1.186-.447l-1.18-2.044a1 1 0 0 1 .205-1.251l1.267-1.114a7.05 7.05 0 0 1 0-2.227L1.821 7.773a1 1 0 0 1-.206-1.25l1.18-2.045a1 1 0 0 1 1.187-.447l1.598.54A6.992 6.992 0 0 1 7.51 3.456l.33-1.652ZM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd"/></svg>
      </button>
      <!-- Logout -->
      <button style="height:32px; padding: 0 12px; border-radius:6px; display:inline-flex; align-items:center; gap:6px; background:transparent; color:#a1a1aa; border:none; cursor:pointer; font-size:12px; font-weight:500; font-family: var(--font-sans)">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 4.25A2.25 2.25 0 0 1 5.25 2h5.5A2.25 2.25 0 0 1 13 4.25v2a.75.75 0 0 1-1.5 0v-2a.75.75 0 0 0-.75-.75h-5.5a.75.75 0 0 0-.75.75v11.5c0 .414.336.75.75.75h5.5a.75.75 0 0 0 .75-.75v-2a.75.75 0 0 1 1.5 0v2A2.25 2.25 0 0 1 10.75 18h-5.5A2.25 2.25 0 0 1 3 15.75V4.25Z" clip-rule="evenodd"/><path fill-rule="evenodd" d="M19 10a.75.75 0 0 0-.22-.53l-3-3a.75.75 0 1 0-1.06 1.06l1.72 1.72H8.75a.75.75 0 0 0 0 1.5h7.69l-1.72 1.72a.75.75 0 1 0 1.06 1.06l3-3A.75.75 0 0 0 19 10Z" clip-rule="evenodd"/></svg>
        Sign out
      </button>
    </div>
  </div>
</div>
</body>
</html>
