<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 18px; background: var(--bg-page); color: var(--fg-1); font-family: var(--font-sans); }
</style>
</head>
<body>
<div style="display:flex; flex-wrap:wrap; gap:8px; border-bottom: 1px solid var(--flux-border); padding: 0 0 0 2px">
  <a style="position:relative; padding: 12px 16px; font-size:14px; font-weight:500; color:#b580ff; text-decoration:none">
    <div>Локальний бізнес</div>
    <div style="margin-top:2px; font-size:10px; font-weight:400; text-transform:uppercase; letter-spacing:.05em; color:#71717a">Google Maps · сайти, телефони</div>
    <span style="position:absolute; bottom:-1px; left:0; right:0; height:2px; background:#a855f7; border-radius:1px"></span>
  </a>
  <a style="padding: 12px 16px; font-size:14px; font-weight:500; color:#a1a1aa; text-decoration:none">
    <div>Виконавці</div>
    <div style="margin-top:2px; font-size:10px; font-weight:400; text-transform:uppercase; letter-spacing:.05em; color:#71717a">SoundCloud · YouTube · Instagram</div>
  </a>
  <a style="padding: 12px 16px; font-size:14px; font-weight:500; color:#a1a1aa; text-decoration:none">
    <div>Універсальний</div>
    <div style="margin-top:2px; font-size:10px; font-weight:400; text-transform:uppercase; letter-spacing:.05em; color:#71717a">Будь-яка ніша · вільний запит</div>
  </a>
</div>
</body>
</html>
